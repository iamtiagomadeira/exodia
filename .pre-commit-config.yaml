# Segurança "at all times" — camada pre-commit (Exodia / Python)
# Instalado por Scooby. Usa as ferramentas locais (pipx/binário) — robusto, sem re-install de envs.
# Bloqueia commits com segredos ou vulnerabilidades NOVAS.
repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: 🔑 gitleaks (segredos)
        entry: gitleaks
        args: ["protect", "--staged", "--no-banner", "--redact"]
        language: system
        pass_filenames: false

      - id: bandit
        name: 🐍 bandit (vulns Python)
        entry: bandit
        args: ["-ll", "-q", "-r", "src", "--baseline", ".bandit-baseline.json"]
        language: system
        pass_filenames: false
        types: [python]

      - id: semgrep
        name: 🛡️ semgrep (vulns código)
        entry: semgrep
        args: ["scan", "--config", "p/default", "--config", "p/python", "--severity", "ERROR", "--error", "--quiet", "--metrics=off", "--baseline-commit", "HEAD", "--exclude", ".venv"]
        language: system
        pass_filenames: false
        types: [python]
